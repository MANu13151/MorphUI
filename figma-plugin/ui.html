<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      color: var(--figma-color-text, #333);
      background: var(--figma-color-bg, #fff);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      height: 100vh;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 700;
      background: linear-gradient(135deg, #818cf8, #c084fc, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header .badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 10px;
      background: #818cf8;
      color: #fff;
      font-weight: 600;
    }

    label {
      font-size: 11px;
      font-weight: 600;
      color: var(--figma-color-text-secondary, #666);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    textarea {
      width: 100%;
      min-height: 100px;
      padding: 10px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 11px;
      border: 1px solid var(--figma-color-border, #ddd);
      border-radius: 6px;
      background: var(--figma-color-bg-secondary, #f5f5f5);
      color: var(--figma-color-text, #333);
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus {
      border-color: #818cf8;
      box-shadow: 0 0 0 2px rgba(129,140,248,0.2);
    }

    .preview-section {
      flex: 1;
      overflow-y: auto;
    }

    .preview-table {
      width: 100%;
      border-collapse: collapse;
    }

    .preview-table th {
      text-align: left;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--figma-color-text-secondary, #999);
      padding: 4px 6px;
      border-bottom: 1px solid var(--figma-color-border, #eee);
    }

    .preview-table td {
      padding: 6px;
      border-bottom: 1px solid var(--figma-color-border, #eee);
      vertical-align: middle;
    }

    .color-pair {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .color-dot {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      border: 1px solid rgba(0,0,0,0.1);
      flex-shrink: 0;
    }

    .arrow {
      color: var(--figma-color-text-secondary, #999);
      font-size: 12px;
    }

    .slot-label {
      font-size: 11px;
      font-weight: 500;
    }

    .node-count {
      font-size: 11px;
      color: var(--figma-color-text-secondary, #999);
      font-style: italic;
    }

    .actions {
      display: flex;
      gap: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--figma-color-border, #eee);
    }

    .btn {
      flex: 1;
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #818cf8, #a78bfa);
      color: #fff;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(129,140,248,0.3);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-ghost {
      background: transparent;
      color: var(--figma-color-text-secondary, #666);
      border: 1px solid var(--figma-color-border, #ddd);
    }

    .btn-ghost:hover {
      background: var(--figma-color-bg-secondary, #f5f5f5);
    }

    .result {
      padding: 10px;
      border-radius: 6px;
      font-size: 12px;
      text-align: center;
    }

    .result-success {
      background: #d1fae5;
      color: #065f46;
    }

    .result-error {
      background: #fee2e2;
      color: #991b1b;
    }

    .empty-state {
      text-align: center;
      padding: 20px;
      color: var(--figma-color-text-secondary, #999);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>MorphUI Sync</h1>
    <span class="badge">v1</span>
  </div>

  <div>
    <label>Paste Palette JSON</label>
    <textarea id="json-input" placeholder='{"version":1,"mappings":[{"from":"#24262b","to":"#1a1a2e","slot":"primary"}]}'></textarea>
  </div>

  <div class="preview-section" id="preview-section">
    <div class="empty-state">Paste your MorphUI JSON above to preview changes</div>
  </div>

  <div id="result-area"></div>

  <div class="actions">
    <button class="btn btn-ghost" id="btn-cancel">Cancel</button>
    <button class="btn btn-primary" id="btn-apply" disabled>Apply to Design</button>
  </div>

  <script>
    let parsedPayload = null;

    const jsonInput = document.getElementById('json-input');
    const previewSection = document.getElementById('preview-section');
    const btnApply = document.getElementById('btn-apply');
    const btnCancel = document.getElementById('btn-cancel');
    const resultArea = document.getElementById('result-area');

    // Parse JSON on input
    jsonInput.addEventListener('input', () => {
      resultArea.innerHTML = '';
      try {
        const data = JSON.parse(jsonInput.value.trim());
        if (!data.mappings || !Array.isArray(data.mappings)) {
          throw new Error('Missing "mappings" array');
        }
        parsedPayload = data;
        renderPreview(data);
        btnApply.disabled = data.mappings.length === 0;

        // Ask plugin code for node counts
        parent.postMessage({ pluginMessage: { type: 'preview', mappings: data.mappings } }, '*');
      } catch (e) {
        parsedPayload = null;
        btnApply.disabled = true;
        previewSection.innerHTML = `<div class="empty-state" style="color:#ef4444">Invalid JSON: ${e.message}</div>`;
      }
    });

    function renderPreview(data) {
      if (data.mappings.length === 0) {
        previewSection.innerHTML = '<div class="empty-state">No color changes in this palette. Edit some colors in MorphUI first!</div>';
        return;
      }

      let html = `<table class="preview-table">
        <thead><tr>
          <th>Change</th>
          <th>Slot</th>
          <th id="col-nodes">Nodes</th>
        </tr></thead><tbody>`;

      for (const m of data.mappings) {
        html += `<tr>
          <td>
            <div class="color-pair">
              <span class="color-dot" style="background:${m.from}"></span>
              <span class="arrow">→</span>
              <span class="color-dot" style="background:${m.to}"></span>
            </div>
          </td>
          <td><span class="slot-label">${m.slotLabel || m.slot}</span></td>
          <td class="node-count" data-slot="${m.slot}">scanning...</td>
        </tr>`;
      }

      html += '</tbody></table>';
      previewSection.innerHTML = html;
    }

    // Apply
    btnApply.addEventListener('click', () => {
      if (!parsedPayload) return;
      btnApply.disabled = true;
      btnApply.textContent = 'Applying...';
      parent.postMessage({ pluginMessage: { type: 'apply-palette', mappings: parsedPayload.mappings } }, '*');
    });

    // Cancel
    btnCancel.addEventListener('click', () => {
      parent.postMessage({ pluginMessage: { type: 'cancel' } }, '*');
    });

    // Listen for messages from plugin code
    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;

      if (msg.type === 'preview-result') {
        const counts = msg.counts || {};
        document.querySelectorAll('.node-count').forEach(el => {
          const slot = el.dataset.slot;
          const count = counts[slot] || 0;
          el.textContent = count > 0 ? `${count} node${count > 1 ? 's' : ''}` : 'no matches';
          el.style.color = count > 0 ? '#059669' : '';
        });
      }

      if (msg.type === 'result') {
        btnApply.textContent = 'Apply to Design';
        btnApply.disabled = false;

        if (msg.error) {
          resultArea.innerHTML = `<div class="result result-error">❌ ${msg.error}</div>`;
        } else {
          resultArea.innerHTML = `<div class="result result-success">✅ Updated ${msg.changed} node${msg.changed !== 1 ? 's' : ''} out of ${msg.total} total</div>`;
        }
      }
    };
  </script>
</body>
</html>
